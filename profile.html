<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🌊 AMTEZ | ملف شخصي</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--glass:rgba(6,182,212,0.04);--border:rgba(6,182,212,0.15);--accent:#06b6d4;--accent2:#22d3ee;--bg:#0a1418;--card:rgba(6,182,212,0.06)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;min-height:100vh;overflow-y:auto;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
        
        /* 🌊 PARALLAX COVER */
        .cover-section{position:relative;width:100%;height:260px;overflow:hidden;cursor:pointer}
        .cover-img{width:100%;height:130%;object-fit:cover;transition:transform 0.1s linear;transform:translateY(0)}
        .cover-gradient{position:absolute;inset:0;background:linear-gradient(to bottom, transparent 30%, rgba(10,20,24,0.4) 60%, rgba(10,20,24,0.95) 100%);pointer-events:none;z-index:1}
        .cover-glow{position:absolute;inset:0;background:radial-gradient(ellipse at center, rgba(6,182,212,0.2) 0%, transparent 70%);pointer-events:none;z-index:2}
        .cover-edit-btn{position:absolute;top:12px;left:12px;background:rgba(0,0,0,0.5);backdrop-filter:blur(15px);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;border:1px solid rgba(6,182,212,0.3);color:#fff;font-size:14px;transition:all 0.3s;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
        .cover-edit-btn:hover{background:rgba(6,182,212,0.4);box-shadow:0 0 20px rgba(6,182,212,0.5)}
        .btn-back{position:fixed;top:20px;right:20px;background:rgba(0,0,0,0.5);backdrop-filter:blur(15px);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;border:1px solid var(--border);color:#fff;font-size:16px;transition:all 0.3s}
        .btn-back:hover{background:rgba(6,182,212,0.3);box-shadow:0 0 20px rgba(6,182,212,0.4)}
        
        .avatar-wrap{position:relative;z-index:2;margin-top:-60px;display:flex;justify-content:center}
        /* 🌊 STORY RING AVATAR */
        .avatar-lg{width:120px;height:120px;border-radius:50%;overflow:hidden;cursor:pointer;background:linear-gradient(135deg, #06b6d4, #22d3ee, #67e8f9);padding:3px;box-shadow:0 0 30px rgba(6,182,212,0.4), 0 0 60px rgba(6,182,212,0.1);animation:avatarGlow 3s ease-in-out infinite}
        @keyframes avatarGlow{0%,100%{box-shadow:0 0 30px rgba(6,182,212,0.4), 0 0 60px rgba(6,182,212,0.1)}50%{box-shadow:0 0 40px rgba(34,211,238,0.7), 0 0 80px rgba(6,182,212,0.3)}}
        .avatar-lg img{width:100%;height:100%;object-fit:cover;border-radius:50%;border:3px solid var(--bg)}
        .avatar-edit-btn{position:absolute;bottom:5px;right:5px;width:30px;height:30px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid var(--bg);color:#fff;font-size:12px;box-shadow:0 0 15px rgba(6,182,212,0.5)}
        .online-dot{position:absolute;top:10px;right:10px;width:18px;height:18px;background:#22c55e;border-radius:50%;border:3px solid var(--bg);z-index:3;box-shadow:0 0 10px rgba(34,197,94,0.6)}
        
        .profile-info{padding:20px 20px 10px;text-align:center}
        .username{font-size:22px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:8px}
        .bio-text{font-size:13px;opacity:0.7;margin-bottom:8px;max-width:320px;margin-left:auto;margin-right:auto;line-height:1.5}
        /* 🌊 GLASS CONTACT */
        .contact-info{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:8px;font-size:12px}
        .contact-info a{color:var(--accent2);text-decoration:none;display:flex;align-items:center;gap:5px;background:var(--card);padding:6px 14px;border-radius:20px;border:1px solid var(--border);transition:all 0.3s}
        .contact-info a:hover{background:rgba(6,182,212,0.15);box-shadow:0 0 15px rgba(6,182,212,0.2)}
        .last-seen{font-size:11px;opacity:0.5;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:6px}
        
        /* 🌊 GLASS STATS */
        .stats-row{display:flex;justify-content:center;gap:30px;margin:15px 20px;padding:18px;background:rgba(6,182,212,0.04);backdrop-filter:blur(20px);border-radius:20px;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,0.2)}
        .stat-item{text-align:center;cursor:pointer;transition:transform 0.2s}
        .stat-item:hover{transform:scale(1.05)}
        .stat-val{font-size:20px;font-weight:700;color:var(--accent2)}
        .stat-lbl{font-size:10px;opacity:0.6;margin-top:2px}
        
        .action-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:0 20px 20px}
        .btn{background:rgba(6,182,212,0.06);border:1px solid var(--border);padding:10px 20px;border-radius:25px;color:#fff;cursor:pointer;font-size:13px;transition:all 0.3s;display:flex;align-items:center;gap:6px;backdrop-filter:blur(10px)}
        .btn:hover{background:rgba(6,182,212,0.15);border-color:var(--accent);box-shadow:0 0 20px rgba(6,182,212,0.2)}
        .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;font-weight:700;box-shadow:0 8px 25px rgba(6,182,212,0.4)}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 35px rgba(6,182,212,0.6)}
        .btn-follow{background:linear-gradient(135deg,#ef4444,#dc2626);border:none;font-weight:700}
        .btn-follow.following{background:linear-gradient(135deg,var(--accent),var(--accent2))}
        
        .section-title{font-size:16px;font-weight:700;padding:0 20px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:0 8px 80px}
        .thumb{aspect-ratio:9/16;background:rgba(6,182,212,0.05);border-radius:8px;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.3s}
        .thumb:hover{transform:scale(1.03);z-index:1;box-shadow:0 0 25px rgba(6,182,212,0.2)}
        .thumb video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
        .thumb .play-count{position:absolute;bottom:6px;left:6px;font-size:10px;background:rgba(0,0,0,0.7);backdrop-filter:blur(5px);padding:3px 8px;border-radius:10px;z-index:2}
        
        .badge-verified{
            background:linear-gradient(135deg, #06b6d4, #0891b2);
            color:#fff;
            font-size:12px;
            padding:3px 6px;
            border-radius:50%;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            width:22px;
            height:22px;
            font-weight:bold;
            box-shadow:0 0 15px rgba(6,182,212,0.6);
            animation:verifyGlow 2s ease-in-out infinite;
        }
        @keyframes verifyGlow{0%,100%{box-shadow:0 0 15px rgba(6,182,212,0.6)}50%{box-shadow:0 0 25px rgba(34,211,238,0.9)}}
        
        /* EDIT PANEL */
        .edit-panel{position:fixed;bottom:0;left:0;right:0;background:rgba(10,20,24,0.98);backdrop-filter:blur(40px);border-top:2px solid var(--accent);border-radius:24px 24px 0 0;padding:24px 20px 40px;z-index:200;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);max-height:80vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(6,182,212,0.1)}
        .edit-panel.show{transform:translateY(0)}
        .edit-panel h3{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--accent2);text-align:center}
        .edit-panel label{display:block;font-size:12px;opacity:0.7;margin-bottom:6px;margin-top:14px}
        .edit-panel input,.edit-panel textarea{width:100%;padding:12px 16px;border-radius:14px;background:var(--card);border:1px solid var(--border);color:#fff;font-size:14px;outline:none;resize:none;font-family:'Segoe UI',sans-serif;transition:border 0.3s}
        .edit-panel input:focus,.edit-panel textarea:focus{border-color:var(--accent);box-shadow:0 0 15px rgba(6,182,212,0.15)}
        .edit-panel textarea{min-height:80px}
        .edit-actions{display:flex;gap:10px;margin-top:20px}
        .edit-actions button{flex:1;padding:12px;border-radius:25px;font-weight:700;cursor:pointer;font-size:14px;transition:all 0.3s}
        .btn-save{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff}
        .btn-cancel{background:var(--card);border:1px solid var(--border);color:#fff}
        .btn-save:hover{box-shadow:0 8px 25px rgba(6,182,212,0.5);transform:translateY(-2px)}
        
        .overlay-panel{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:150;display:none}
        .overlay-panel.show{display:block}
        
        .spinner{width:36px;height:36px;border:3px solid rgba(6,182,212,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:30px auto}
        @keyframes spin{to{transform:rotate(360deg)}}
        .load-center{display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:12px;color:rgba(255,255,255,0.5)}
        .empty-state{text-align:center;opacity:0.5;padding:40px 20px;grid-column:1/-1}
        .empty-state i{font-size:48px;color:var(--accent);margin-bottom:12px;display:block}
        .toast-msg{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(10,20,24,0.95);padding:12px 24px;border-radius:30px;z-index:300;border:1px solid rgba(6,182,212,0.3);font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
        .toast-msg.show{opacity:1}

        /* 🌊 ADMIN PANEL */
        .admin-panel{background:transparent;border:none;padding:0 8px;margin:0 8px 100px 8px;font-family:'Segoe UI',sans-serif}
        .admin-panel h3{color:#22d3ee;font-size:20px;margin-bottom:20px;display:flex;align-items:center;gap:10px;font-weight:700}
        .admin-stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
        .stat-card{background:rgba(6,182,212,0.06);border:1px solid rgba(6,182,212,0.15);border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(10px)}
        .stat-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 15px rgba(6,182,212,0.3)}
        .stat-info h4{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:4px;font-weight:500}
        .stat-info span{font-size:22px;font-weight:800}
        .admin-user-list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;color:rgba(255,255,255,0.6);font-size:13px;font-weight:600;border-bottom:1px solid rgba(6,182,212,0.1);padding-bottom:8px}
        .admin-user-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03);transition:background 0.2s;border-radius:8px;padding:8px}
        .admin-user-item:hover{background:rgba(6,182,212,0.04)}
        .admin-user-info{display:flex;align-items:center;gap:12px}
        .admin-avatar{width:40px;height:40px;border-radius:50%;background:#333;overflow:hidden;border:2px solid rgba(6,182,212,0.3)}
        .admin-avatar img{width:100%;height:100%;object-fit:cover}
        .admin-user-details h4{font-weight:600;font-size:15px;display:flex;align-items:center;gap:5px}
        .admin-user-details p{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
        .admin-user-actions{display:flex;gap:8px;align-items:center}
        .admin-btn{border:none;border-radius:20px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px}
        .admin-btn:active{transform:scale(0.95)}
        .btn-ban{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.1)}
        .btn-ban:hover{background:rgba(239,68,68,0.2)}
        .btn-unban{background:rgba(34,197,94,0.1);color:#4ade80;border:1px solid rgba(34,197,94,0.2)}
        .btn-unban:hover{background:rgba(34,197,94,0.2)}
        .btn-verify{background:linear-gradient(135deg, #06b6d4, #0891b2);color:#fff;box-shadow:0 4px 12px rgba(6,182,212,0.3)}
        .btn-verify:hover{box-shadow:0 6px 18px rgba(6,182,212,0.5);transform:translateY(-1px)}
        .btn-verify.unverify{background:rgba(255,255,255,0.1);color:#fff;box-shadow:none}
        .btn-verify.unverify:hover{background:rgba(239,68,68,0.2);color:#f87171}
    </style>
</head>
<body>

<div class="load-center" id="loader"><div class="spinner"></div><span>🌊 تحميل الملف...</span></div>

<div id="content" style="display:none">
    <!-- 🌊 PARALLAX COVER -->
    <div class="cover-section" id="coverSection" onmousemove="parallaxCover(event)">
        <img class="cover-img" id="coverImg" src="" alt="cover" style="display:none">
        <div class="cover-gradient"></div>
        <div class="cover-glow"></div>
        <div class="cover-edit-btn" id="coverEditBtn" onclick="event.stopPropagation();document.getElementById('coverInput').click()" style="display:none">
            <i class="fas fa-camera"></i>
        </div>
    </div>
    <input type="file" id="coverInput" accept="image/*" style="display:none" onchange="uploadCover(this)">
    
    <button class="btn-back" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
    
    <div class="avatar-wrap">
        <div class="avatar-lg" id="avatarDisplay">
            <img src="" alt="avatar" id="avatarImg">
            <div class="avatar-edit-btn" id="avatarEditBtn" onclick="event.stopPropagation();document.getElementById('avatarInput').click()" style="display:none">
                <i class="fas fa-camera"></i>
            </div>
            <div class="online-dot" id="onlineDot" style="display:none"></div>
        </div>
    </div>
    <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">

    <div class="profile-info">
        <div class="username"><span id="nameDisplay"></span></div>
        <div class="bio-text" id="bioDisplay"></div>
        <div class="contact-info" id="contactInfo"></div>
        <div class="last-seen" id="lastSeenDisplay"></div>
    </div>

    <div class="stats-row">
        <div class="stat-item" onclick="showList('following')"><div class="stat-val" id="statFollowing">0</div><div class="stat-lbl">يتابع</div></div>
        <div class="stat-item" onclick="showList('followers')"><div class="stat-val" id="statFollowers">0</div><div class="stat-lbl">متابع</div></div>
        <div class="stat-item"><div class="stat-val" id="statLikes">0</div><div class="stat-lbl">إعجابات</div></div>
    </div>

    <div class="action-btns" id="actionsBar"></div>

    <div class="section-title"><i class="fas fa-water" style="color:var(--accent)"></i> الفيديوهات</div>
    <div class="grid" id="videosGrid"></div>
</div>

<div class="overlay-panel" id="overlayPanel" onclick="closeEditPanel()"></div>
<div class="edit-panel" id="editPanel">
    <h3>🌊 لوحة تعديل الملف الشخصي</h3>
    <label>👤 اسم المستخدم</label>
    <input type="text" id="editUsername" placeholder="اسم المستخدم">
    <label>📝 السيرة الذاتية</label>
    <textarea id="editBio" placeholder="اكتب شيئاً عن نفسك..."></textarea>
    <label>🌐 الموقع الإلكتروني</label>
    <input type="text" id="editWebsite" placeholder="https://example.com">
    <label>📧 البريد الإلكتروني</label>
    <input type="text" id="editContactEmail" placeholder="example@email.com">
    <label>🎨 لون الغلاف</label>
    <div id="coverColors" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"></div>
    <div class="edit-actions">
        <button class="btn-cancel" onclick="closeEditPanel()">إلغاء</button>
        <button class="btn-save" onclick="saveProfile()"><i class="fas fa-save"></i> حفظ التغييرات</button>
    </div>
</div>

<div class="toast-msg" id="toastMsg">✅ تم</div>

<script src="firebase-config.js"></script>
<script>
    let profileUserId = null;
    let currentUser = null;
    let currentUserData = null;
    let allVideos = [];
    let allUsers = {};
    let isOwnProfile = false;
    let _selectedCover = null;

    // 🌊 PARALLAX EFFECT
    window.parallaxCover = function(event) {
        const cover = document.getElementById('coverSection');
        const img = document.getElementById('coverImg');
        if (!img || !img.src || img.style.display === 'none') return;
        const rect = cover.getBoundingClientRect();
        const y = event.clientY - rect.top;
        const percent = (y / rect.height - 0.5) * 0.15;
        img.style.transform = `translateY(${percent * 100}px)`;
    };

    auth.onAuthStateChanged(async u => {
        if (!u) { window.location.href = 'auth.html'; return; }
        currentUser = u;
        const params = new URLSearchParams(window.location.search);
        profileUserId = params.get('uid') || u.uid;
        isOwnProfile = (profileUserId === u.uid);
        const snap = await db.ref('users/' + u.uid).get();
        if (snap.exists()) currentUserData = { uid: u.uid, ...snap.val() };
        await loadAll();
        await loadProfile();
        if (!isOwnProfile) {
            db.ref('presence/' + profileUserId).on('value', s => {
                const isOnline = s.val();
                const dot = document.getElementById('onlineDot');
                const lastSeen = document.getElementById('lastSeenDisplay');
                if (dot) dot.style.display = isOnline ? 'block' : 'none';
                if (lastSeen) {
                    const userData = allUsers[profileUserId];
                    if (userData) {
                        lastSeen.innerHTML = isOnline ? '<i class="fas fa-circle" style="color:#22c55e;font-size:8px"></i> نشط الآن' : '<i class="fas fa-clock"></i> آخر ظهور: ' + formatTime(userData.lastSeen);
                    }
                }
            });
        }
        document.getElementById('loader').style.display = 'none';
        document.getElementById('content').style.display = 'block';
    });

    async function loadAll() {
        const us = await db.ref('users').once('value'); 
        allUsers = us.val() || {};
        const vs = await db.ref('videos').once('value'); 
        allVideos = Object.entries(vs.val() || {}).map(([k, v]) => ({ id: k, ...v }));
    }

    async function loadProfile() {
        const u = allUsers[profileUserId];
        if (!u) {
            document.getElementById('content').innerHTML = '<div class="empty-state" style="padding-top:100px"><i class="fas fa-user-slash"></i><p>المستخدم غير موجود</p></div>';
            return;
        }

        const aquaVerifiedBadge = u.isVerified ? '<span class="badge-verified">✓</span>' : '';
        document.getElementById('nameDisplay').innerHTML = '@' + (u.username || 'مستخدم') + ' ' + aquaVerifiedBadge;
        document.getElementById('bioDisplay').innerText = u.bio || 'لم تتم إضافة سيرة ذاتية بعد';
        
        const contactInfo = document.getElementById('contactInfo');
        let contactHTML = '';
        if (u.website) contactHTML += `<a href="${u.website}" target="_blank"><i class="fas fa-globe"></i> ${u.website.replace('https://','').replace('http://','')}</a>`;
        if (u.contactEmail) contactHTML += `<a href="mailto:${u.contactEmail}"><i class="fas fa-envelope"></i> ${u.contactEmail}</a>`;
        contactInfo.innerHTML = contactHTML;

        document.getElementById('statFollowing').innerText = Object.keys(u.following || {}).length;
        document.getElementById('statFollowers').innerText = Object.keys(u.followers || {}).length;
        
        const uvs = allVideos.filter(v => v.sender === profileUserId);
        document.getElementById('statLikes').innerText = uvs.reduce((s, v) => s + (v.likes || 0), 0);
        
        const coverImg = document.getElementById('coverImg');
        if (u.coverImageUrl) {
            coverImg.src = u.coverImageUrl;
            coverImg.style.display = 'block';
        } else {
            document.getElementById('coverSection').style.background = u.coverColor || COVER_COLORS[0];
            coverImg.style.display = 'none';
        }
        
        document.getElementById('avatarImg').src = u.avatarUrl || (DICEBEAR_URL + '?seed=' + profileUserId);

        if (isOwnProfile) {
            document.getElementById('avatarEditBtn').style.display = 'flex';
            document.getElementById('coverEditBtn').style.display = 'flex';
        }

        const lastSeen = document.getElementById('lastSeenDisplay');
        if (!isOwnProfile) {
            const presenceSnap = await db.ref('presence/' + profileUserId).get();
            const isOnline = presenceSnap.val();
            document.getElementById('onlineDot').style.display = isOnline ? 'block' : 'none';
            lastSeen.innerHTML = isOnline ? '<i class="fas fa-circle" style="color:#22c55e;font-size:8px"></i> نشط الآن' : '<i class="fas fa-clock"></i> آخر ظهور: ' + formatTime(u.lastSeen || u.createdAt);
        }

        const g = document.getElementById('videosGrid');
        g.innerHTML = '';
        if (!uvs.length) {
            g.innerHTML = '<div class="empty-state"><i class="fas fa-video-slash"></i><p>لا توجد فيديوهات</p></div>';
        } else {
            uvs.forEach(v => {
                const d = document.createElement('div');
                d.className = 'thumb';
                d.innerHTML = `<video src="${v.url}" muted loop playsinline preload="metadata"></video><span class="play-count">❤️ ${v.likes || 0}</span>`;
                d.onclick = () => { const video = d.querySelector('video'); if (video.paused) { video.play(); } else { video.pause(); } };
                g.appendChild(d);
            });
        }

        const actionsBar = document.getElementById('actionsBar');
        if (isOwnProfile) {
            actionsBar.innerHTML = `
                <button class="btn btn-primary" onclick="openEditPanel()"><i class="fas fa-edit"></i> تعديل الملف</button>
                <button class="btn" onclick="window.location.href='chat.html'"><i class="fas fa-envelope"></i> الرسائل</button>
                <button class="btn" onclick="auth.signOut();window.location.href='auth.html'"><i class="fas fa-sign-out-alt"></i> خروج</button>`;
        } else {
            const isFollowing = currentUserData?.following?.[profileUserId];
            actionsBar.innerHTML = `
                <button class="btn btn-follow ${isFollowing ? 'following' : ''}" id="followBtn" onclick="toggleFollowUser()">${isFollowing ? '<i class="fas fa-user-check"></i> متابع' : '<i class="fas fa-user-plus"></i> متابعة'}</button>
                <button class="btn btn-primary" onclick="window.location.href='chat.html?uid=${profileUserId}'"><i class="fas fa-comment"></i> مراسلة</button>
                <button class="btn" onclick="copyProfile()"><i class="fas fa-copy"></i> نسخ المعلومات</button>`;
        }

        if (isOwnProfile && ADMIN_EMAILS.includes(currentUser?.email)) {
            loadAdminPanel();
        }
    }

    function openEditPanel() {
        const u = allUsers[profileUserId] || currentUserData;
        document.getElementById('editUsername').value = u.username || '';
        document.getElementById('editBio').value = u.bio || '';
        document.getElementById('editWebsite').value = u.website || '';
        document.getElementById('editContactEmail').value = u.contactEmail || '';
        _selectedCover = u.coverColor || COVER_COLORS[0];
        const colorsDiv = document.getElementById('coverColors');
        colorsDiv.innerHTML = COVER_COLORS.map((c, i) => `<div onclick="selectCover('${c.replace(/'/g, "\'")}', this)" style="width:40px;height:40px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${_selectedCover === c ? '#fff' : 'transparent'};transition:all 0.2s;box-shadow:0 4px 15px rgba(0,0,0,0.3)" title="غلاف ${i+1}"></div>`).join('');
        document.getElementById('editPanel').classList.add('show');
        document.getElementById('overlayPanel').classList.add('show');
    }

    function closeEditPanel() {
        document.getElementById('editPanel').classList.remove('show');
        document.getElementById('overlayPanel').classList.remove('show');
    }

    function selectCover(color, el) {
        _selectedCover = color;
        document.getElementById('coverSection').style.background = color;
        document.getElementById('coverImg').style.display = 'none';
        document.querySelectorAll('#coverColors div').forEach(d => d.style.borderColor = 'transparent');
        el.style.borderColor = '#fff';
    }

    async function saveProfile() {
        const username = document.getElementById('editUsername').value.trim();
        const bio = document.getElementById('editBio').value.trim();
        const website = document.getElementById('editWebsite').value.trim();
        const contactEmail = document.getElementById('editContactEmail').value.trim();
        if (!username || username.length < 3) { showToast('❌ اسم المستخدم 3 أحرف على الأقل'); return; }
        const updates = { username, bio, website, contactEmail };
        if (_selectedCover) updates.coverColor = _selectedCover;
        try {
            await db.ref('users/' + profileUserId).update(updates);
            closeEditPanel();
            await loadAll();
            await loadProfile();
            showToast('✅ تم حفظ التغييرات بنجاح');
        } catch(e) { showToast('❌ حدث خطأ'); console.error(e); }
    }

    async function uploadAvatar(inp) {
        const file = inp.files[0]; if (!file) return;
        showToast('⏳ جاري رفع الصورة...');
        const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET);
        try {
            const res = await fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.secure_url) {
                await db.ref('users/' + profileUserId).update({ avatarUrl: data.secure_url, hasCustomAvatar: true });
                document.getElementById('avatarImg').src = data.secure_url;
                showToast('✅ تم تحديث الصورة الشخصية');
            } else { showToast('❌ فشل رفع الصورة'); }
        } catch(e) { showToast('❌ خطأ في الرفع'); console.error(e); }
        inp.value = '';
    }

    async function uploadCover(inp) {
        const file = inp.files[0]; if (!file) return;
        showToast('⏳ جاري رفع الغلاف...');
        const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET);
        try {
            const res = await fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.secure_url) {
                await db.ref('users/' + profileUserId).update({ coverImageUrl: data.secure_url, hasCustomCover: true });
                const coverImg = document.getElementById('coverImg');
                coverImg.src = data.secure_url;
                coverImg.style.display = 'block';
                document.getElementById('coverSection').style.background = 'none';
                showToast('✅ تم تحديث الغلاف');
            } else { showToast('❌ فشل رفع الغلاف'); }
        } catch(e) { showToast('❌ خطأ في الرفع'); console.error(e); }
        inp.value = '';
    }

    async function toggleFollowUser() {
        if (!currentUser || isOwnProfile) return;
        const btn = document.getElementById('followBtn');
        const userRef = db.ref('users/' + currentUser.uid + '/following/' + profileUserId);
        const targetRef = db.ref('users/' + profileUserId + '/followers/' + currentUser.uid);
        const snap = await userRef.get();
        if (snap.exists()) { await userRef.remove(); await targetRef.remove(); btn.innerHTML = '<i class="fas fa-user-plus"></i> متابعة'; btn.classList.remove('following'); }
        else { await userRef.set(true); await targetRef.set(true); btn.innerHTML = '<i class="fas fa-user-check"></i> متابع'; btn.classList.add('following'); }
        await loadAll();
        await loadProfile();
    }

    async function copyProfile() {
        const u = allUsers[profileUserId];
        const text = `👤 @${u.username || 'مستخدم'}\n📝 ${u.bio || ''}\n🌊 AMTEZ Wave 2026`;
        try { await navigator.clipboard.writeText(text); } catch(e) {
            const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        }
        showToast('✅ تم نسخ معلومات الملف الشخصي');
    }

    function showList(type) {
        const u = allUsers[profileUserId];
        const list = type === 'followers' ? (u?.followers || {}) : (u?.following || {});
        const ids = Object.keys(list);
        if (!ids.length) { alert('لا يوجد'); return; }
        const names = ids.map(id => { const user = allUsers[id]; return user ? '@' + user.username : 'مستخدم'; }).join('\n');
        alert((type === 'followers' ? 'المتابِعون' : 'المتابَعون') + ':\n' + names);
    }

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg; toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function formatTime(ts) {
        if (!ts) return 'غير معروف';
        const now = Date.now(); const diff = now - ts;
        const mins = Math.floor(diff / 60000);
        const hours = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);
        if (mins < 1) return 'الآن';
        if (mins < 60) return 'منذ ' + mins + ' دقيقة';
        if (hours < 24) return 'منذ ' + hours + ' ساعة';
        if (days < 7) return 'منذ ' + days + ' يوم';
        return new Date(ts).toLocaleDateString('ar-SA');
    }

    // 🌊 ADMIN PANEL
    async function loadAdminPanel() {
        const gridContainer = document.querySelector('.grid');
        if (!gridContainer) return;
        const oldPanel = document.getElementById('adminPanelContainer');
        if (oldPanel) oldPanel.remove();
        const adminDiv = document.createElement('div');
        adminDiv.id = 'adminPanelContainer';
        adminDiv.className = 'admin-panel';
        const totalUsers = Object.keys(allUsers).length;
        const totalOnline = Object.values(allUsers).filter(u => u.lastSeen && (Date.now() - u.lastSeen < 120000)).length;
        const totalVideos = allVideos.length;
        const totalVerified = Object.values(allUsers).filter(u => u.isVerified).length;
        const totalBanned = Object.values(allUsers).filter(u => u.banned).length;
        adminDiv.innerHTML = `
            <h3><i class="fas fa-shield-haltered"></i> لوحة تحكم الأدمن</h3>
            <div class="admin-stats-grid">
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-info"><h4>المستخدمين</h4><span>${totalUsers}</span></div></div>
                <div class="stat-card"><div class="stat-icon" style="background: linear-gradient(135deg, #22c55e, #16a34a);"><i class="fas fa-wifi"></i></div><div class="stat-info"><h4>متصلين</h4><span>${totalOnline}</span></div></div>
                <div class="stat-card"><div class="stat-icon" style="background: linear-gradient(135deg, #f59e0b, #d97706);"><i class="fas fa-video"></i></div><div class="stat-info"><h4>فيديوهات</h4><span>${totalVideos}</span></div></div>
                <div class="stat-card"><div class="stat-icon" style="background: linear-gradient(135deg, #22d3ee, #06b6d4);"><i class="fas fa-check-circle"></i></div><div class="stat-info"><h4>موثقين</h4><span>${totalVerified}</span></div></div>
                <div class="stat-card" style="grid-column: span 2;"><div class="stat-icon" style="background: linear-gradient(135deg, #ef4444, #dc2626);"><i class="fas fa-ban"></i></div><div class="stat-info"><h4>محظورين</h4><span>${totalBanned}</span></div></div>
            </div>
            <div class="admin-user-list-header"><span>📋 قائمة المستخدمين (أحدث 15)</span><span style="font-size: 11px;">${totalUsers} إجمالي</span></div>
            <div id="adminDynamicList"></div>`;
        gridContainer.after(adminDiv);
        loadAdminUsersList();
    }

    async function loadAdminUsersList() {
        const listContainer = document.getElementById('adminDynamicList');
        if (!listContainer) return;
        const usersArray = Object.entries(allUsers)
            .sort(([, a], [, b]) => (b.createdAt || 0) - (a.createdAt || 0))
            .slice(0, 15);
        if (!usersArray.length) { listContainer.innerHTML = '<div style="text-align:center;opacity:0.5;padding:20px">لا يوجد مستخدمون</div>'; return; }
        listContainer.innerHTML = usersArray.map(([id, u]) => {
            const avatar = u.avatarUrl || (DICEBEAR_URL + '?seed=' + id);
            const username = u.username || 'مستخدم';
            const email = u.email || '';
            const isVerified = u.isVerified;
            const isBanned = u.banned;
            const verifiedBadgeHtml = isVerified ? '<span class="badge-verified">✓</span>' : '';
            let actionBtns = '';
            if (isBanned) {
                actionBtns = `<button class="admin-btn btn-unban" onclick="toggleBanUser('${id}')"><i class="fas fa-undo"></i> إلغاء الحظر</button>`;
            } else {
                actionBtns = `
                    <button class="admin-btn btn-verify ${isVerified ? 'unverify' : ''}" onclick="toggleVerifyUser('${id}')">
                        ${isVerified ? '<i class="fas fa-times-circle"></i> إلغاء' : '<i class="fas fa-check-circle"></i> توثيق'}
                    </button>
                    <button class="admin-btn btn-ban" onclick="toggleBanUser('${id}')"><i class="fas fa-ban"></i> حظر</button>`;
            }
            return `<div class="admin-user-item" onclick="if(event.target.tagName !== 'BUTTON' && event.target.tagName !== 'I') openUserProfile('${id}')" style="cursor: pointer;">
                    <div class="admin-user-info"><div class="admin-avatar"><img src="${avatar}" alt="avatar"></div><div class="admin-user-details"><h4>@${username} ${verifiedBadgeHtml}</h4><p>${email}</p></div></div>
                    <div class="admin-user-actions" onclick="event.stopPropagation();">${actionBtns}</div></div>`;
        }).join('');
    }

    window.toggleVerifyUser = async function(id) {
        const snap = await db.ref('users/' + id).once('value');
        const data = snap.val();
        if (!data) return;
        const newState = !data.isVerified;
        if (!confirm(`تأكيد ${newState ? 'توثيق' : 'إلغاء توثيق'} @${data.username || 'المستخدم'}؟`)) return;
        await db.ref('users/' + id).update({ isVerified: newState, verifiedAt: newState ? Date.now() : null, verifiedBy: newState ? currentUser.uid : null });
        await loadAll(); await loadProfile();
        showToast(`✅ تم ${newState ? 'توثيق' : 'إلغاء توثيق'} المستخدم`);
    };

    window.toggleBanUser = async function(id) {
        const snap = await db.ref('users/' + id).once('value');
        const data = snap.val();
        if (!data) return;
        const newState = !data.banned;
        if (!confirm(`تأكيد ${newState ? 'حظر' : 'إلغاء حظر'} @${data.username || 'المستخدم'}؟`)) return;
        await db.ref('users/' + id).update({ banned: newState, bannedAt: newState ? Date.now() : null, bannedBy: newState ? currentUser.uid : null });
        await loadAll(); await loadProfile();
        showToast(`✅ تم ${newState ? 'حظر' : 'إلغاء حظر'} المستخدم`);
    };

    window.openUserProfile = function(id) {
        if (id === currentUser?.uid) { window.location.href = 'profile.html'; }
        else { window.location.href = 'profile.html?uid=' + id; }
    };

    console.log('🌊 AMTEZ Profile v5 Ready ✨');
</script>
</body>
</html>
